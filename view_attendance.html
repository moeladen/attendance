<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Attendance</title>
    <link rel="stylesheet" href="t.css">
    <!-- Optionally, include Bootstrap CSS for better styling -->
    <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> -->
</head>
<body>
    <div class="container">
        <h1>Attendance Records</h1>
        <div id="attendance-records" class="table-responsive"></div>
    </div>

    <script>
        // Fetch and display attendance records
        fetch('view_attendance.php')
            .then(response => response.text())
            .then(data => document.getElementById('attendance-records').innerHTML = data)
            .catch(error => console.error('Error fetching attendance records:', error));
    </script>
</body>
</html>
